<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
        }

        header {
            background-color: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        .btn {
            background-color: #1976d2;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>

<header>
    <h1>Bem-vindo ao meu site</h1>
</header>

<main>
    <h2>Página inicial</h2>
    <p>Este é um exemplo básico de HTML.</p>

    <button class="btn" onclick="mostrarMensagem()">Clique aqui</button>

    <p id="mensagem"></p>
</main>

<script>
    function mostrarMensagem() {
        document.getElementById("mensagem").innerText = "Olá! Funcionou corretamente 🚀";
    }
</script>

</body>
</html>
